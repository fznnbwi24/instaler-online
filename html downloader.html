<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Center</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            text-align: center;
            margin: 0;
        }

        header {
            background: #007BFF;
            color: white;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            margin: 15px auto;
            padding: 15px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        button {
            background: #28a745;
            border: none;
            padding: 10px 15px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<header>
    <h1>📥 Download Center</h1>
    <p>Download file dengan mudah</p>
</header>

<div class="container">

    <div class="card">
        <h3>File PDF</h3>
        <p>Download contoh file PDF</p>
        <a href="file/contoh.pdf" download>
            <button>Download</button>
        </a>
    </div>

    <div class="card">
        <h3>Gambar</h3>
        <p>Download gambar keren</p>
        <a href="file/gambar.jpg" download>
            <button>Download</button>
        </a>
    </div>

    <div class="card">
        <h3>Music</h3>
        <p>Download lagu</p>
        <a href="file/lagu.mp3" download>
            <button>Download</button>
        </a>
    </div>

</div>

</body>
</html>
